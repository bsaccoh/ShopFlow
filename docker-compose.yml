version: '3.8'

services:
  app:
    build:
      context: .
      args:
        - VITE_API_BASE_URL=/api/v1
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DB_NAME=multi_tenant_pos
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_jwt}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-another_secret_for_refresh}
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
      - POSTGRES_DB=multi_tenant_pos
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Auto-run schema and seed files on creation
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d multi_tenant_pos" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
